     .topic h1{
           color:white;

     #chartContainer{

     .sidemenu{
     margin-top: -8px;

<script>
window.onload = function() {

var chart = new CanvasJS.Chart("chartContainer", {
	animationEnabled: true,
	title: {
		text: ""
	},
	data: [{
	{% if chart_type == "line" %}
		type: "line",
	{% elif chart_type == "column" %}
		type: "column",
	{% elif chart_type == "doughnut" %}
		type: "doughnut",
	{% endif %}
		startAngle: 240,
		yValueFormatString: "##0.\"\"",
		indexLabel: "{label} {y}",
		dataPoints: [
		{% for o in form %}
			{y: {{o.dcount}}, label: "{{o.place}}"},
		{% endfor %}
		]
	}]
});
chart.render();

}

</script>
<body>
<div class="topic">



<div class="sidemenu">
    <h3 style="color:black;margin-left:60px;margin-top:80px"><a href="{% url 'graph' 'column' %}" style="color: aliceblue;">COLUMN CHAERT</a></h3>
    <h3 style="color:white;margin-left:60px;margin-top:100px;"><a href="{% url 'graph' 'line' %}" style="color: aliceblue;">LINE CHART</a></h3>
    <h3 style="color:white;margin-left:60px;margin-top:100px;"><a href="{% url 'graph' 'doughnut' %}" style="color: aliceblue;">SPLINE CHART</a></h3>
</div>
<div id="chartContainer" class="graph"></div>
<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
</div>

</body>
